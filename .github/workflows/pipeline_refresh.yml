name: Pipeline Refresh

on:
  schedule:
    # Every 6 hours (UTC)
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: pipeline-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: backend
    env:
      PYTHONPATH: ${{ github.workspace }}/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify sheet connection (Phase 0)
        run: python scripts/test_sheet_connection.py

      - name: Run full pipeline refresh (Phases 1–4)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/run_pipeline_refresh.py

      - name: Run eval harness (Phase 8)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/run_eval.py

      - name: Summary
        if: always()
        run: echo "Scheduled pipeline refresh completed at $(date -u)"
